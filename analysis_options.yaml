include: package:flutter_lints/flutter.yaml

analyzer:
  exclude:
    - "**/*.g.dart"
    - "**/*.freezed.dart"

linter:
  rules:
    prefer_single_quotes: true
    directives_ordering: true
    require_trailing_commas: true
    # Over-triggers on `if (x != null) Wrapper(child: ...x...)` where the
    # element is a wrapper rather than the bare nullable value.
    use_null_aware_elements: false
