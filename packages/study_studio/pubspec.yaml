name: study_studio
description: "Study Studio — the detachable AI study-environment module for Cockpit."
version: 0.0.1
publish_to: none
resolution: workspace

environment:
  sdk: ^3.12.2
  flutter: ">=1.17.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.2
  cockpit_core:
    path: ../cockpit_core
  cockpit_ui:
    path: ../cockpit_ui
  cockpit_module:
    path: ../cockpit_module

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  assets:
    - assets/images/ai_study_companion.png
